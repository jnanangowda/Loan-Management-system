<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Loan Manager">
    <meta name="theme-color" content="#667eea">
    <title>💰 Loan Manager - Professional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 0;
            margin: 0;
            position: fixed;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        /* AUTH CONTAINER */
        .auth-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            display: none;
        }

        .auth-container.active {
            display: flex;
        }

        .auth-box {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.5s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-box h2 {
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-size: 1.8em;
            font-weight: 700;
        }

        .auth-subtitle {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .auth-form-group {
            margin-bottom: 16px;
        }

        .auth-form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #2d3748;
            font-size: 0.92em;
        }

        .auth-form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e7ff;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s;
        }

        .auth-form-group input:focus {
            outline: none;
            border-color: #667eea;
            background-color: #f8f9ff;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .auth-btn:active {
            transform: scale(0.98);
        }

        .auth-toggle {
            text-align: center;
            margin-top: 16px;
            color: #666;
            font-size: 0.9em;
        }

        .auth-toggle a {
            color: #667eea;
            cursor: pointer;
            text-decoration: underline;
            font-weight: 600;
        }

        .auth-links {
            text-align: center;
            margin-top: 12px;
            font-size: 0.85em;
        }

        .auth-links a {
            color: #667eea;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            margin: 0 5px;
        }

        #authMessage {
            text-align: center;
            margin-bottom: 16px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: 500;
            display: none;
        }

        #authMessage.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        #authMessage.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        /* FORM SECTIONS */
        .auth-form-section {
            display: none;
        }

        .auth-form-section.active {
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 12px;
            font-size: 0.85em;
        }

        .back-link a {
            color: #667eea;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }

        /* MAIN APP STYLES */
        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 0;
            display: none;
        }

        .container.active {
            display: flex;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 18px 20px;
            text-align: center;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-content {
            flex: 1;
            text-align: center;
        }
        
        .header h1 {
            font-size: 1.6em;
            margin-bottom: 2px;
            font-weight: 700;
        }
        
        .header p {
            font-size: 0.8em;
            opacity: 0.95;
            font-weight: 500;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-name {
            font-size: 0.85em;
            font-weight: 600;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:active {
            background: rgba(255,255,255,0.3);
        }
        
        .tabs {
            display: flex;
            background: #f5f5f5;
            border-bottom: 2px solid #e0e0e0;
            flex-shrink: 0;
            gap: 0;
            overflow-x: auto;
        }
        
        .tabs button {
            flex: 1;
            padding: 13px 8px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            min-width: 80px;
            white-space: nowrap;
        }
        
        .tabs button.active {
            background: white;
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .tabs button:active {
            background: #f9f9f9;
        }
        
        .content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 16px;
            padding-bottom: 65px;
        }
        
        .content::-webkit-scrollbar {
            width: 6px;
        }
        
        .content::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        .content::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 3px;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #2d3748;
            font-size: 0.92em;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e7ff;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-color: white;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            background-color: #f8f9ff;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            min-width: 120px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:active {
            transform: scale(0.98);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-warning {
            background: #ffc107;
            color: #333;
        }
        
        .btn-small {
            padding: 10px 12px;
            font-size: 0.85em;
            flex: none;
        }
        
        .alert {
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 15px;
            animation: slideIn 0.3s;
            font-weight: 500;
        }
        
        @keyframes slideIn {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .loan-card {
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f7ff 100%);
            border: 2px solid #e0e7ff;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 14px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.1);
        }
        
        .loan-card:active {
            border-color: #667eea;
            box-shadow: 0 6px 15px rgba(102, 126, 234, 0.25);
            transform: translateY(-2px);
        }
        
        .loan-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
        }
        
        .loan-name {
            font-weight: 700;
            color: #2d3748;
            font-size: 1.08em;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .status-badge {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.75em;
            font-weight: 600;
            white-space: nowrap;
        }
        
        .status-active {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            color: #155724;
        }
        
        .status-closed {
            background: linear-gradient(135deg, #e2e3e5 0%, #d3d4d6 100%);
            color: #383d41;
        }

        .status-pending {
            background: linear-gradient(135deg, #fff3cd 0%, #ffeaa7 100%);
            color: #856404;
        }

        .status-overdue {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            color: #721c24;
        }
        
        .loan-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 0.85em;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
            background: white;
            padding: 10px;
            border-radius: 8px;
            border-left: 3px solid #667eea;
        }
        
        .info-label {
            color: #667eea;
            font-size: 0.8em;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .info-value {
            color: #2d3748;
            font-weight: 700;
            margin-top: 4px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        
        .empty-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }
        
        .empty-text {
            font-size: 1em;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .details-section {
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 1.05em;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .payment-item {
            background: white;
            border-left: 4px solid #667eea;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 6px rgba(102, 126, 234, 0.1);
            transition: all 0.3s;
        }

        .payment-item.paid {
            background: #e8f5e9;
            border-left-color: #28a745;
            opacity: 0.7;
        }

        .payment-item.paid .payment-checkbox {
            accent-color: #28a745;
        }

        .payment-item.overdue {
            background: #ffebee;
            border-left-color: #dc3545;
        }
        
        .payment-info {
            flex: 1;
        }
        
        .payment-month {
            font-weight: 700;
            color: #2d3748;
            font-size: 0.95em;
        }

        .payment-item.paid .payment-month {
            text-decoration: line-through;
            color: #999;
        }
        
        .payment-amount {
            font-size: 0.85em;
            color: #667eea;
            margin-top: 3px;
            font-weight: 600;
        }
        
        .payment-checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
            flex-shrink: 0;
            accent-color: #667eea;
        }

        .payment-item.paid .payment-checkbox {
            cursor: not-allowed;
        }
        
        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .summary-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        
        .summary-label {
            font-size: 0.75em;
            opacity: 0.95;
            margin-bottom: 6px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .summary-value {
            font-size: 1.2em;
            font-weight: 700;
        }
        
        .back-btn {
            background: linear-gradient(135deg, #6c757d 0%, #5a6268 100%);
            color: white;
            padding: 11px 16px;
            display: inline-block;
            margin-bottom: 16px;
            cursor: pointer;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        
        .back-btn:active {
            transform: scale(0.95);
        }
        
        .details-view {
            display: none;
        }
        
        .details-view.active {
            display: block;
        }

        .payment-view {
            display: none;
        }

        .payment-view.active {
            display: block;
        }

        .edit-view {
            display: none;
        }

        .edit-view.active {
            display: block;
        }
        
        .calculation-box {
            background: linear-gradient(135deg, #f0f7ff 0%, #e8f4fd 100%);
            border: 2px solid #667eea;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .calculation-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e0e7ff;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .calculation-item:last-child {
            border-bottom: none;
        }
        
        .calculation-label {
            color: #2d3748;
            font-weight: 600;
            font-size: 0.92em;
            flex: 1;
            min-width: 150px;
        }
        
        .calculation-value {
            color: #667eea;
            font-weight: 700;
            font-size: 1.05em;
        }
        
        .total-amount {
            color: #28a745;
            font-size: 1.15em;
        }
        
        .edit-mode {
            background: linear-gradient(135deg, #f0f7ff 0%, #e8f4fd 100%);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            border-left: 4px solid #667eea;
        }
        
        .info-card {
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f7ff 100%);
            border-left: 4px solid #667eea;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.1);
        }
        
        .info-card-title {
            font-weight: 700;
            color: #667eea;
            margin-bottom: 6px;
            font-size: 0.95em;
        }
        
        .info-card-desc {
            font-size: 0.85em;
            color: #555;
            line-height: 1.5;
        }

        h3 {
            margin-bottom: 16px;
            font-size: 1.15em;
            font-weight: 700;
            color: #2d3748;
        }

        .edit-btn, .delete-btn, .pdf-btn, .whatsapp-btn {
            background: #667eea;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            border: none;
            font-size: 0.8em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 8px;
            margin-bottom: 8px;
        }

        .delete-btn {
            background: #dc3545;
        }

        .pdf-btn {
            background: #28a745;
        }

        .whatsapp-btn {
            background: #25d366;
        }

        .edit-btn:active, .delete-btn:active, .pdf-btn:active, .whatsapp-btn:active {
            transform: scale(0.95);
        }

        .payment-stats {
            background: linear-gradient(135deg, #f0f7ff 0%, #e8f4fd 100%);
            border: 2px solid #667eea;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #e0e7ff;
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-label {
            font-weight: 600;
            color: #2d3748;
        }

        .stat-value {
            font-weight: 700;
            color: #667eea;
            font-size: 1.1em;
        }

        .principal-section {
            background: linear-gradient(135deg, #f0f7ff 0%, #e8f4fd 100%);
            border: 2px solid #667eea;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .principal-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e0e7ff;
        }

        .principal-item:last-child {
            border-bottom: none;
        }

        .principal-label {
            color: #2d3748;
            font-weight: 600;
        }

        .principal-value {
            color: #28a745;
            font-weight: 700;
            font-size: 1.1em;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .modal-title {
            font-size: 1.3em;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 16px;
        }

        .modal-form-group {
            margin-bottom: 16px;
        }

        .modal-form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #2d3748;
            font-size: 0.92em;
        }

        .modal-form-group input, .modal-form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e7ff;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s;
        }

        .modal-form-group input:focus, .modal-form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            background-color: #f8f9ff;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-btn.save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .modal-btn.cancel {
            background: #e0e0e0;
            color: #333;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }
    </style>
</head>
<body>
    <!-- AUTH CONTAINER -->
    <div class="auth-container active">
        <div class="auth-box">
            <h2>Welcome Back 👋</h2>
            <p class="auth-subtitle">Sign in to your Loan Manager account</p>
            <div id="authMessage"></div>
            
            <!-- Login Form -->
            <div class="auth-form-section active" id="loginForm">
                <div class="auth-form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com">
                </div>
                <div class="auth-form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••">
                </div>
                <button class="auth-btn" onclick="handleLogin()">Sign In</button>
                <div class="auth-toggle">
                    Don't have an account? <a onclick="switchAuthForm('signupForm')">Create one</a>
                </div>
                <div class="auth-links">
                    <a onclick="switchAuthForm('forgotForm')">Forgot password?</a>
                </div>
            </div>

            <!-- Signup Form -->
            <div class="auth-form-section" id="signupForm">
                <div class="auth-form-group">
                    <label>Full Name</label>
                    <input type="text" id="signupName" placeholder="John Doe">
                </div>
                <div class="auth-form-group">
                    <label>Email Address</label>
                    <input type="email" id="signupEmail" placeholder="you@example.com">
                </div>
                <div class="auth-form-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" placeholder="••••••••">
                </div>
                <button class="auth-btn" onclick="handleSignup()">Create Account</button>
                <div class="auth-toggle">
                    Already have an account? <a onclick="switchAuthForm('loginForm')">Sign in</a>
                </div>
            </div>

            <!-- Forgot Password Form -->
            <div class="auth-form-section" id="forgotForm">
                <div class="auth-form-group">
                    <label>Email Address</label>
                    <input type="email" id="forgotEmail" placeholder="you@example.com">
                </div>
                <button class="auth-btn" onclick="handleForgot()">Reset Password</button>
                <div class="back-link">
                    <a onclick="switchAuthForm('loginForm')">Back to login</a>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN APP CONTAINER -->
    <div class="container">
        <div class="header">
            <div class="header-content">
                <h1>💰 Loan Manager</h1>
                <p>Manage your loans efficiently</p>
            </div>
            <div class="user-section">
                <span class="user-name" id="userName">User</span>
                <button class="logout-btn" onclick="handleLogout()">Logout</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(0, this)">📋 Loans</button>
            <button class="tab-btn" onclick="switchTab(1, this)">➕ New Loan</button>
        </div>

        <div class="content">
            <!-- LOANS TAB -->
            <div class="tab-content active" id="tab0">
                <div id="loansList"></div>
            </div>

            <!-- NEW LOAN TAB -->
            <div class="tab-content" id="tab1">
                <h3>Create New Loan</h3>
                <div class="form-group">
                    <label>Borrower Name</label>
                    <input type="text" id="borrowerName" placeholder="Enter borrower's name">
                </div>
                <div class="form-group">
                    <label>Loan Amount</label>
                    <input type="number" id="loanAmount" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Interest Rate (%)</label>
                    <input type="number" id="interestRate" placeholder="5.0">
                </div>
                <div class="form-group">
                    <label>Loan Duration (months)</label>
                    <input type="number" id="loanDuration" placeholder="12">
                </div>
                <div class="button-group">
                    <button class="btn-primary" onclick="handleAddLoan()">Create Loan</button>
                </div>
            </div>
        </div>
    </div>

    <!-- DETAILS MODAL -->
    <div class="modal" id="detailsModal">
        <div class="modal-content">
            <div class="details-view" id="detailsView">
                <button class="back-btn" onclick="closeModal('detailsModal')">← Back</button>
                <div id="loanDetails"></div>
            </div>
            <div class="payment-view" id="paymentView">
                <button class="back-btn" onclick="showView('detailsView')">← Back to Details</button>
                <div id="paymentContent"></div>
            </div>
            <div class="edit-view" id="editView">
                <button class="back-btn" onclick="showView('detailsView')">← Back to Details</button>
                <div id="editContent"></div>
            </div>
        </div>
    </div>

    <script>
        // Mock Data & State
        let loans = JSON.parse(localStorage.getItem('loans')) || [];
        let currentUser = JSON.parse(localStorage.getItem('currentUser'));
        let currentLoanId = null;

        // Initialize App
        if (!currentUser) {
            document.querySelector('.auth-container').classList.add('active');
            document.querySelector('.container').classList.remove('active');
        } else {
            document.querySelector('.auth-container').classList.remove('active');
            document.querySelector('.container').classList.add('active');
            document.getElementById('userName').textContent = currentUser.name;
            displayLoans();
        }

        // Auth Functions
        function switchAuthForm(formId) {
            document.querySelectorAll('.auth-form-section').forEach(el => el.classList.remove('active'));
            document.getElementById(formId).classList.add('active');
            document.getElementById('authMessage').className = '';
            document.getElementById('authMessage').textContent = '';
        }

        function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showAuthMessage('Please fill all fields', 'error');
                return;
            }

            const users = JSON.parse(localStorage.getItem('users')) || [];
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                localStorage.setItem('currentUser', JSON.stringify(user));
                currentUser = user;
                document.querySelector('.auth-container').classList.remove('active');
                document.querySelector('.container').classList.add('active');
                document.getElementById('userName').textContent = user.name;
                displayLoans();
            } else {
                showAuthMessage('Invalid email or password', 'error');
            }
        }

        function handleSignup() {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            
            if (!name || !email || !password) {
                showAuthMessage('Please fill all fields', 'error');
                return;
            }

            const users = JSON.parse(localStorage.getItem('users')) || [];
            if (users.find(u => u.email === email)) {
                showAuthMessage('Email already registered', 'error');
                return;
            }

            const newUser = { id: Date.now(), name, email, password };
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            showAuthMessage('Account created! Signing in...', 'success');
            
            setTimeout(() => {
                localStorage.setItem('currentUser', JSON.stringify(newUser));
                currentUser = newUser;
                document.querySelector('.auth-container').classList.remove('active');
                document.querySelector('.container').classList.add('active');
                document.getElementById('userName').textContent = newUser.name;
                displayLoans();
            }, 1500);
        }

        function handleForgot() {
            const email = document.getElementById('forgotEmail').value;
            if (!email) {
                showAuthMessage('Please enter your email', 'error');
                return;
            }
            showAuthMessage('Password reset link sent to your email', 'success');
            setTimeout(() => switchAuthForm('loginForm'), 2000);
        }

        function handleLogout() {
            localStorage.removeItem('currentUser');
            currentUser = null;
            document.querySelector('.container').classList.remove('active');
            document.querySelector('.auth-container').classList.add('active');
            switchAuthForm('loginForm');
        }

        function showAuthMessage(msg, type) {
            const msgEl = document.getElementById('authMessage');
            msgEl.textContent = msg;
            msgEl.className = type;
        }

        // App Functions
        function handleAddLoan() {
            const name = document.getElementById('borrowerName').value;
            const amount = parseFloat(document.getElementById('loanAmount').value);
            const rate = parseFloat(document.getElementById('interestRate').value);
            const duration = parseInt(document.getElementById('loanDuration').value);

            if (!name || !amount || !rate || !duration) {
                alert('Please fill all fields');
                return;
            }

            const loan = {
                id: Date.now(),
                userId: currentUser.id,
                name,
                amount,
                rate,
                duration,
                startDate: new Date().toISOString(),
                status: 'active',
                payments: generatePaymentSchedule(duration)
            };

            loans.push(loan);
            localStorage.setItem('loans', JSON.stringify(loans));
            displayLoans();
            
            document.getElementById('borrowerName').value = '';
            document.getElementById('loanAmount').value = '';
            document.getElementById('interestRate').value = '';
            document.getElementById('loanDuration').value = '';
            
            switchTab(0);
        }

        function generatePaymentSchedule(months) {
            const payments = [];
            
            for (let i = 1; i <= months; i++) {
                payments.push({
                    month: i,
                    dueDate: new Date(Date.now() + (i * 30 * 24 * 60 * 60 * 1000)).toLocaleDateString(),
                    amount: 0,
                    paid: false,
                    paidDate: null
                });
            }
            return payments;
        }

        function displayLoans() {
            const userLoans = loans.filter(l => l.userId === currentUser.id);
            const container = document.getElementById('loansList');
            
            if (userLoans.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">No loans yet</div></div>';
                return;
            }

            container.innerHTML = userLoans.map(loan => `
                <div class="loan-card" onclick="viewLoanDetails(${loan.id})">
                    <div class="loan-header">
                        <div class="loan-name">${loan.name}</div>
                        <span class="status-badge status-${loan.status}">${loan.status}</span>
                    </div>
                    <div class="loan-info">
                        <div class="info-item">
                            <span class="info-label">Amount</span>
                            <span class="info-value">₹${loan.amount.toFixed(2)}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Rate</span>
                            <span class="info-value">${loan.rate}%</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function viewLoanDetails(loanId) {
            currentLoanId = loanId;
            const loan = loans.find(l => l.id === loanId);
            
            const detailsHtml = `
                <h3>${loan.name}</h3>
                <div class="summary-grid">
                    <div class="summary-card">
                        <div class="summary-label">Principal</div>
                        <div class="summary-value">₹${loan.amount}</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-label">Rate</div>
                        <div class="summary-value">${loan.rate}%</div>
                    </div>
                </div>
                <div class="button-group">
                    <button class="btn-primary" onclick="editLoan(${loanId})">Edit</button>
                    <button class="btn-success" onclick="showPayments(${loanId})">Payments</button>
                    <button class="btn-danger" onclick="deleteLoan(${loanId})">Delete</button>
                </div>
            `;

            document.getElementById('loanDetails').innerHTML = detailsHtml;
            showModal('detailsModal');
            showView('detailsView');
        }

        function showPayments(loanId) {
            const loan = loans.find(l => l.id === loanId);
            const paymentHtml = `
                <h3>Payment Schedule</h3>
                <div class="payment-stats">
                    ${loan.payments.map((p, idx) => `
                        <div class="payment-item ${p.paid ? 'paid' : ''}">
                            <div class="payment-info">
                                <div class="payment-month">Month ${p.month}</div>
                                <div class="payment-amount">${p.dueDate}</div>
                            </div>
                            <input type="checkbox" class="payment-checkbox" ${p.paid ? 'checked disabled' : ''} onchange="togglePayment(${loanId}, ${idx})">
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('paymentContent').innerHTML = paymentHtml;
            showView('paymentView');
        }

        function togglePayment(loanId, index) {
            const loan = loans.find(l => l.id === loanId);
            loan.payments[index].paid = !loan.payments[index].paid;
            if (loan.payments[index].paid) {
                loan.payments[index].paidDate = new Date().toLocaleDateString();
            }
            localStorage.setItem('loans', JSON.stringify(loans));
            showPayments(loanId);
        }

        function editLoan(loanId) {
            const loan = loans.find(l => l.id === loanId);
            const editHtml = `
                <h3>Edit Loan</h3>
                <div class="form-group">
                    <label>Borrower Name</label>
                    <input type="text" id="editName" value="${loan.name}">
                </div>
                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" id="editAmount" value="${loan.amount}">
                </div>
                <div class="form-group">
                    <label>Interest Rate (%)</label>
                    <input type="number" id="editRate" value="${loan.rate}">
                </div>
                <div class="button-group">
                    <button class="btn-primary" onclick="saveEditLoan(${loanId})">Save</button>
                    <button class="btn-secondary" onclick="showView('detailsView')">Cancel</button>
                </div>
            `;
            document.getElementById('editContent').innerHTML = editHtml;
            showView('editView');
        }

        function saveEditLoan(loanId) {
            const loan = loans.find(l => l.id === loanId);
            loan.name = document.getElementById('editName').value;
            loan.amount = parseFloat(document.getElementById('editAmount').value);
            loan.rate = parseFloat(document.getElementById('editRate').value);
            localStorage.setItem('loans', JSON.stringify(loans));
            displayLoans();
            viewLoanDetails(loanId);
        }

        function deleteLoan(loanId) {
            if (confirm('Are you sure?')) {
                loans = loans.filter(l => l.id !== loanId);
                localStorage.setItem('loans', JSON.stringify(loans));
                displayLoans();
                closeModal('detailsModal');
            }
        }

        function switchTab(index, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab' + index).classList.add('active');
            btn.classList.add('active');
        }

        function showModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function showView(viewId) {
            document.querySelectorAll('.details-view, .payment-view, .edit-view').forEach(el => el.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }
    </script>
</body>
</html>
